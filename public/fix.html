<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一鍵修復 - Market Pulse</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #d4183d 0%, #7B9FA6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 32px;
      padding: 50px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
      text-align: center;
    }
    
    h1 {
      color: #d4183d;
      font-size: 36px;
      margin-bottom: 20px;
    }
    
    .subtitle {
      color: #6B6B6B;
      font-size: 16px;
      margin-bottom: 40px;
      line-height: 1.6;
    }
    
    .warning {
      background: #FFF8E7;
      border-left: 4px solid #D4A574;
      padding: 15px;
      margin-bottom: 30px;
      text-align: left;
      border-radius: 8px;
    }
    
    .warning-title {
      color: #D4A574;
      font-weight: 600;
      margin-bottom: 5px;
    }
    
    .warning-text {
      color: #6B6B6B;
      font-size: 14px;
    }
    
    button {
      width: 100%;
      padding: 20px;
      border: none;
      border-radius: 20px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 15px;
    }
    
    .btn-fix {
      background: linear-gradient(135deg, #d4183d 0%, #c41739 100%);
      color: white;
      font-size: 24px;
    }
    
    .btn-fix:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(212, 24, 61, 0.4);
    }
    
    .btn-fix:active {
      transform: translateY(-1px);
    }
    
    .btn-secondary {
      background: #FAFAF8;
      color: #3A3A3A;
    }
    
    .btn-secondary:hover {
      background: #F0F0F0;
    }
    
    .status {
      margin-top: 30px;
      padding: 20px;
      background: #FAFAF8;
      border-radius: 16px;
      display: none;
    }
    
    .status.show {
      display: block;
    }
    
    .status-item {
      padding: 10px 0;
      color: #3A3A3A;
      font-size: 14px;
    }
    
    .status-success {
      color: #7B9FA6;
    }
    
    .status-error {
      color: #d4183d;
    }
    
    .countdown {
      font-size: 48px;
      font-weight: 700;
      color: #7B9FA6;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 一鍵修復</h1>
    <p class="subtitle">
      遇到資料庫錯誤？<br>
      點擊下方按鈕立即修復
    </p>
    
    <div class="warning">
      <div class="warning-title">⚠️ 注意</div>
      <div class="warning-text">
        此操作將刪除所有本地資料（市集、商品、交易記錄等），且無法復原。
      </div>
    </div>
    
    <button class="btn-fix" onclick="fixNow()">
      🚀 立即修復
    </button>
    
    <button class="btn-secondary" onclick="window.location.href='/'">
      返回首頁
    </button>
    
    <div class="status" id="status"></div>
  </div>
  
  <script>
    function isLocalRepairPage() {
      return ['localhost', '127.0.0.1', '::1'].includes(window.location.hostname);
    }

    function log(message, type = 'info') {
      const statusEl = document.getElementById('status');
      statusEl.classList.add('show');
      
      const item = document.createElement('div');
      item.className = `status-item status-${type}`;
      item.textContent = message;
      statusEl.appendChild(item);
    }
    
    async function fixNow() {
      if (!isLocalRepairPage()) {
        alert('This repair tool is only available on localhost.');
        return;
      }

      if (!confirm('確定要重置資料庫嗎？\n\n此操作將刪除所有本地資料，且無法復原。')) {
        return;
      }
      
      const statusEl = document.getElementById('status');
      statusEl.innerHTML = '';
      statusEl.classList.add('show');
      
      try {
        log('🗑️ 正在刪除資料庫...', 'info');
        
        // 刪除資料庫
        await new Promise((resolve, reject) => {
          const request = indexedDB.deleteDatabase('MarketPulseDB');
          
          request.onsuccess = () => {
            log('✅ 資料庫已刪除', 'success');
            resolve();
          };
          
          request.onerror = () => {
            log('❌ 刪除失敗: ' + request.error, 'error');
            reject(request.error);
          };
          
          request.onblocked = () => {
            log('⚠️ 資料庫被鎖定，請關閉其他分頁', 'error');
            reject(new Error('Database blocked'));
          };
        });
        
        // 清除 localStorage
        log('🗑️ 清除 localStorage...', 'info');
        localStorage.clear();
        log('✅ localStorage 已清除', 'success');
        
        // 清除 sessionStorage
        log('🗑️ 清除 sessionStorage...', 'info');
        sessionStorage.clear();
        log('✅ sessionStorage 已清除', 'success');
        
        // 倒數計時
        log('🎉 修復完成！', 'success');
        
        const countdown = document.createElement('div');
        countdown.className = 'countdown';
        countdown.textContent = '3';
        statusEl.appendChild(countdown);
        
        log('正在重新載入頁面...', 'info');
        
        let count = 3;
        const timer = setInterval(() => {
          count--;
          countdown.textContent = count;
          if (count === 0) {
            clearInterval(timer);
            window.location.href = '/';
          }
        }, 1000);
        
      } catch (error) {
        log('❌ 修復失敗: ' + error.message, 'error');
        log('請嘗試手動清除瀏覽器資料', 'error');
      }
    }
  </script>
</body>
</html>
