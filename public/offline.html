<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>離線模式 - Féria</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background:
        radial-gradient(circle at 86% 12%, rgba(255, 255, 255, 0.18), transparent 15rem),
        linear-gradient(135deg, #7B9FA6 0%, #7B9FA6 46%, #D4A574 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 24px;
      padding: 48px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    }

    .icon {
      font-size: 64px;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      font-size: 24px;
      color: #3A3A3A;
      margin-bottom: 12px;
      font-weight: 600;
    }

    p {
      font-size: 16px;
      color: #6B6B6B;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .button {
      display: inline-block;
      background: #7B9FA6;
      color: white;
      padding: 14px 32px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
      cursor: pointer;
      border: none;
      font-size: 16px;
    }

    .button:hover {
      background: #6A8E95;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(123, 159, 166, 0.3);
    }

    .button:active {
      transform: translateY(0);
    }

    .tips {
      margin-top: 32px;
      padding-top: 32px;
      border-top: 1px solid #E5E5E5;
    }

    .tips h2 {
      font-size: 14px;
      color: #6B6B6B;
      margin-bottom: 12px;
      font-weight: 500;
    }

    .tips ul {
      list-style: none;
      text-align: left;
    }

    .tips li {
      font-size: 13px;
      color: #6B6B6B;
      padding: 8px 0;
      padding-left: 24px;
      position: relative;
    }

    .tips li:before {
      content: "•";
      position: absolute;
      left: 8px;
      color: #7B9FA6;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>目前處於離線模式</h1>
    <p>無法連接到網路，但您仍可以使用已快取的功能。Féria 的所有數據都安全地儲存在您的裝置上。</p>
    
    <button class="button" onclick="window.location.reload()">
      重新連線
    </button>

    <div class="tips">
      <h2>💡 離線模式下可用功能</h2>
      <ul>
        <li>查看已有的市集和商品資料</li>
        <li>記錄新的銷售和互動</li>
        <li>查看本地數據分析</li>
        <li>所有數據會在恢復網路後自動同步</li>
      </ul>
    </div>
  </div>

  <script>
    // 每 5 秒檢查一次網路狀態
    setInterval(() => {
      if (navigator.onLine) {
        window.location.reload();
      }
    }, 5000);

    // 監聽網路狀態變化
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
