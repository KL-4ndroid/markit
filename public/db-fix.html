<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoothBook - 資料庫修復工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #6F8F86 0%, #D9A66A 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 24px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    }
    
    h1 {
      color: #2F3432;
      font-size: 28px;
      margin-bottom: 10px;
    }
    
    .subtitle {
      color: #6B6B6B;
      font-size: 14px;
      margin-bottom: 30px;
    }
    
    .status {
      background: #F7F3EA;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #E8E8E8;
    }
    
    .status-item:last-child {
      border-bottom: none;
    }
    
    .status-label {
      color: #6B6B6B;
      font-size: 14px;
    }
    
    .status-value {
      color: #2F3432;
      font-weight: 500;
    }
    
    .status-value.success {
      color: #6F8F86;
    }
    
    .status-value.error {
      color: #C7776E;
    }
    
    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 10px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #6F8F86 0%, #5A7A70 100%);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(111, 143, 134, 0.3);
    }
    
    .btn-danger {
      background: #F5E6E8;
      color: #C7776E;
    }
    
    .btn-danger:hover {
      background: #E8D5D8;
    }
    
    .btn-secondary {
      background: #F7F3EA;
      color: #2F3432;
    }
    
    .btn-secondary:hover {
      background: #EEEAE0;
    }
    
    .log {
      background: #2F3432;
      color: #F7F3EA;
      border-radius: 12px;
      padding: 15px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
      margin-top: 20px;
      display: none;
    }
    
    .log.show {
      display: block;
    }
    
    .log-line {
      margin-bottom: 5px;
    }
    
    .log-success {
      color: #6F8F86;
    }
    
    .log-error {
      color: #C7776E;
    }
    
    .log-info {
      color: #D9A66A;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 資料庫修復工具</h1>
    <p class="subtitle">BoothBook - 資料庫診斷與修復</p>
    
    <div class="status">
      <div class="status-item">
        <span class="status-label">IndexedDB 支援</span>
        <span class="status-value" id="indexeddb-support">檢查中...</span>
      </div>
      <div class="status-item">
        <span class="status-label">資料庫狀態</span>
        <span class="status-value" id="db-status">檢查中...</span>
      </div>
      <div class="status-item">
        <span class="status-label">儲存空間</span>
        <span class="status-value" id="storage-status">檢查中...</span>
      </div>
    </div>
    
    <button class="btn-primary" onclick="checkDatabase()">🔍 診斷資料庫</button>
    <button class="btn-danger" onclick="resetDatabase()">🗑️ 重置資料庫</button>
    <button class="btn-secondary" onclick="window.location.href='/'">🏠 返回首頁</button>
    
    <div class="log" id="log"></div>
  </div>
  
  <script>
    function isLocalRepairPage() {
      return ['localhost', '127.0.0.1', '::1'].includes(window.location.hostname);
    }

    // 日誌函數
    function log(message, type = 'info') {
      const logEl = document.getElementById('log');
      logEl.classList.add('show');
      
      const line = document.createElement('div');
      line.className = `log-line log-${type}`;
      line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }
    
    // 檢查 IndexedDB 支援
    function checkIndexedDBSupport() {
      const supported = !!window.indexedDB;
      const el = document.getElementById('indexeddb-support');
      el.textContent = supported ? '✅ 支援' : '❌ 不支援';
      el.className = `status-value ${supported ? 'success' : 'error'}`;
      return supported;
    }
    
    // 檢查儲存空間
    async function checkStorage() {
      const el = document.getElementById('storage-status');
      
      if (navigator.storage && navigator.storage.estimate) {
        try {
          const estimate = await navigator.storage.estimate();
          const used = (estimate.usage / 1024 / 1024).toFixed(2);
          const quota = (estimate.quota / 1024 / 1024).toFixed(2);
          const percent = (estimate.usage / estimate.quota * 100).toFixed(1);
          
          el.textContent = `${used} MB / ${quota} MB (${percent}%)`;
          el.className = 'status-value success';
          
          log(`儲存空間：已使用 ${used} MB，配額 ${quota} MB`, 'success');
        } catch (error) {
          el.textContent = '❌ 無法檢查';
          el.className = 'status-value error';
          log(`檢查儲存空間失敗：${error.message}`, 'error');
        }
      } else {
        el.textContent = '⚠️ 不支援';
        el.className = 'status-value';
      }
    }
    
    // 檢查資料庫
    async function checkDatabase() {
      log('開始診斷資料庫...', 'info');
      
      const el = document.getElementById('db-status');
      
      try {
        // 列出所有資料庫
        if (indexedDB.databases) {
          const dbs = await indexedDB.databases();
          log(`找到 ${dbs.length} 個資料庫`, 'info');
          
          const marketPulseDB = dbs.find(db => db.name === 'MarketPulseDB');
          if (marketPulseDB) {
            log(`MarketPulseDB 存在，版本：${marketPulseDB.version}`, 'success');
          } else {
            log('MarketPulseDB 不存在', 'error');
          }
        }
        
        // 嘗試開啟資料庫
        const request = indexedDB.open('MarketPulseDB');
        
        request.onsuccess = () => {
          const db = request.result;
          log(`資料庫版本：${db.version}`, 'success');
          log(`資料表：${Array.from(db.objectStoreNames).join(', ')}`, 'success');
          
          el.textContent = '✅ 正常';
          el.className = 'status-value success';
          
          db.close();
        };
        
        request.onerror = () => {
          log(`無法開啟資料庫：${request.error}`, 'error');
          el.textContent = '❌ 錯誤';
          el.className = 'status-value error';
        };
        
      } catch (error) {
        log(`診斷失敗：${error.message}`, 'error');
        el.textContent = '❌ 錯誤';
        el.className = 'status-value error';
      }
    }
    
    // 重置資料庫
    async function resetDatabase() {
      if (!isLocalRepairPage()) {
        alert('This repair tool is only available on localhost.');
        return;
      }

      if (!confirm('⚠️ 警告：此操作將刪除所有本地資料（市集、商品、交易記錄等），且無法復原。\n\n確定要繼續嗎？')) {
        return;
      }
      
      log('開始重置資料庫...', 'info');
      
      try {
        // 1. 刪除資料庫
        log('正在刪除 MarketPulseDB...', 'info');
        await new Promise((resolve, reject) => {
          const request = indexedDB.deleteDatabase('MarketPulseDB');
          request.onsuccess = resolve;
          request.onerror = reject;
          request.onblocked = () => {
            log('資料庫被鎖定，請關閉其他分頁', 'error');
            reject(new Error('Database blocked'));
          };
        });
        log('✅ 資料庫已刪除', 'success');
        
        // 2. 清除 localStorage
        log('正在清除 localStorage...', 'info');
        localStorage.clear();
        log('✅ localStorage 已清除', 'success');
        
        // 3. 清除 sessionStorage
        log('正在清除 sessionStorage...', 'info');
        sessionStorage.clear();
        log('✅ sessionStorage 已清除', 'success');
        
        // 4. 更新狀態
        document.getElementById('db-status').textContent = '✅ 已重置';
        document.getElementById('db-status').className = 'status-value success';
        
        log('🎉 重置完成！', 'success');
        log('正在重新載入頁面...', 'info');
        
        // 5. 重新載入頁面
        setTimeout(() => {
          window.location.href = '/';
        }, 2000);
        
      } catch (error) {
        log(`❌ 重置失敗：${error.message}`, 'error');
        alert(`重置失敗：${error.message}\n\n請嘗試手動清除瀏覽器資料。`);
      }
    }
    
    // 頁面載入時執行檢查
    window.addEventListener('load', () => {
      checkIndexedDBSupport();
      checkStorage();
      checkDatabase();
    });
  </script>
</body>
</html>
